{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Register — Edflix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FBF8F3;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(231,94,36,0.10) 0, transparent 55%),
        radial-gradient(ellipse at 80% 85%, rgba(255,122,69,0.07) 0, transparent 55%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(231,94,36,0.15);
      border-radius: 20px;
      padding: 48px;
      width: 440px;
      max-width: 100%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 32px;
    }
    .logo-ed  { font-size: 1.5rem; font-weight: 800; color: #0A0A0B; }
    .logo-flix{ font-size: 1.5rem; font-weight: 800; color: #E75E24; }
    .logo-tag {
      margin-left: 8px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      color: #E75E24; background: rgba(231,94,36,0.08);
      border: 1px solid rgba(231,94,36,0.22);
      padding: 2px 8px; border-radius: 4px;
    }
    h1 { font-size: 1.5rem; font-weight: 800; color: #0A0A0B; margin-bottom: 6px; }
    .sub { color: #4B5563; font-size: 0.88rem; margin-bottom: 28px; }
    .sub a { color: #E75E24; text-decoration: none; }
    .sub a:hover { color: #C94E18; }
    .error {
      background: rgba(220,38,38,0.06);
      border: 1px solid rgba(220,38,38,0.20);
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.87rem;
      margin-bottom: 18px;
    }
    .form { display: flex; flex-direction: column; gap: 18px; }
    .field { display: flex; flex-direction: column; gap: 7px; }
    label {
      font-size: 0.78rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: #4B5563;
    }
    input {
      background: rgba(255,255,255,0.90);
      border: 1px solid rgba(231,94,36,0.15);
      color: #0A0A0B;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 0.92rem;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #9CA3AF; }
    input:focus {
      outline: none;
      border-color: #E75E24;
      box-shadow: 0 0 0 3px rgba(231,94,36,0.10);
    }
    button {
      background: #E75E24;
      color: #fff;
      font-weight: 700;
      padding: 13px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    button:hover { background: #C94E18; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-ed">Ed</span><span class="logo-flix">flix</span>
      <span class="logo-tag">Teacher</span>
    </div>
    <h1>Create Teacher Account</h1>
    <p class="sub">Already registered? <a href="{% url 'teacher_login' %}">Sign in →</a></p>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}

    <form method="post" class="form">
      {% csrf_token %}
      <div class="field">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required autofocus value="{{ request.POST.name }}">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="your@email.com" required value="{{ request.POST.email }}">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="At least 6 characters" required>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Repeat password" required>
      </div>
      <button type="submit">Create Account</button>
    </form>
  </div>
</body>
</html>
